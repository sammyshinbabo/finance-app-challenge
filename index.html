<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            My Spending Dashboard
        </title>
        <link rel = "stylesheet" href="style.css">
    </head>
    <body>
        <div class = "container">
            <header class = "header">
                <h1> My Transaction Dashboard </h1>
                <button id = "add-btn" class = "btn-add"> Add +</button>
            </header>
            <div class = "filters">
                <input type = "text" id = "search-input" placeholder = "Search Descriptons...">
                <select id = "category-select">
                    <option value = ""> All Categories </option>
                </select>
            </div>
            <table class = "transaction-table">
                <thead>
                    <tr>
                        <th>Num.</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th class="text-center">Amount ($)</th>
                        <th class="text-center">Category</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <div id = "pagination" class ="pagination"></div>
            <div class = "total-section">
                <div class="total-label">Total</div>
                <div class="total-amount" id="total-amount">$0.00</div>
                <div class="total-spacer"> </div>
            </div>
        </div>
        <div id="modal" class="modal-overlay">
            <div class="modal-content">
                <h2> Add Transaction </h2>
                <form id = "add-form">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="form-date" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="form-desc" placeholder="e.g.Takeout" required>
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="form-amount" step="0.01" placeholder="e.g." required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="form-category" placeholder="e.g.deposit " required>
                    </div>
                    <div class="form-group">
                        <label>Type (Income/Expense)</label>
                        <select id="form-type" required>
                            <option value="expense">Expense (-)</option>
                            <option value="income">Income (+)</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button type="button" id="cancel-btn" class="btn-cancel">Cancel</button>
                        <button type="submit" id="submit-btn" class="btn-save">Submit</button>
                    </div>
                </form>
            </div>    
        </div>
        <script src="script.js"></script>
    </body>
</html>
